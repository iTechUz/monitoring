global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://mon.iqroagency.uz
          - http://lms.itechacademy.uz
          - https://admin.lms.itechacademy.uz
          - https://api.lms.itechacademy.uz/api
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox_exporter:9115
      - source_labels: [__param_target]
        target_label: instance
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']
